kind = "web"
previewPath = "/"
title = "معرض التدريب"
version = "1.0.0"
id = "artifacts/internship-expo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21050

[services.development]
run = "pnpm --filter @workspace/internship-expo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/internship-expo", "run", "build" ]
publicDir = "artifacts/internship-expo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21050"
BASE_PATH = "/"
